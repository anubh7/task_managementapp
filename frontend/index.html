<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Management App</title>
  <link rel="stylesheet" href="src/index.css" />
</head>
<body>
  <main class="container">
    <div id="auth-container" class="auth-container">
      <h1>Task Management App</h1>
      <form id="login-form" class="form-section">
        <h2>Login</h2>
        <input id="login-username" type="text" placeholder="Username" required />
        <input id="login-password" type="password" placeholder="Password" required />
        <button type="button" id="login-btn">Login</button>
        <p>Don't have an account? <a href="#" id="show-register">Register</a></p>
      </form>
      <form id="register-form" class="form-section" style="display: none;">
        <h2>Register</h2>
        <input id="register-username" type="text" placeholder="Username (min 3 chars)" required />
        <input id="register-password" type="password" placeholder="Password (min 6 chars)" required />
        <button type="button" id="register-btn">Register</button>
        <p>Already have an account? <a href="#" id="show-login">Login</a></p>
      </form>
    </div>
    <div id="task-container" class="task-container" style="display: none;">
      <div class="header">
        <h1>My Tasks</h1>
        <div id="user-display" class="user-display"></div>
        <button id="logout-btn" class="logout-btn">Logout</button>
      </div>
      <form id="task-form" class="task-form">
        <input id="task-input" type="text" placeholder="Add a new task..." required />
        <button type="submit">Add Task</button>
      </form>
      <ul id="task-list" class="task-list"></ul>
    </div>
  </main>
  <script src="src/index.js"></script>
</body>
</html>
