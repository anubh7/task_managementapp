<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Management App</title>
  <link rel="stylesheet" href="index.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" integrity="sha256-xwE/5s5EmMZR90h2QKCV3G4gG0X+x1uO7pGY7g6Y67o=" crossorigin="" />
</head>
<body>
  <div class="quotes-background">
    <div class="quote-container">
      <p class="quote-text" id="quote-text"></p>
      <p class="quote-author" id="quote-author"></p>
    </div>
  </div>
  <main class="container">
    <!-- Authentication Container -->
    <div id="auth-container" class="auth-container">
      <h1>Task Management App</h1>

      <!-- Login Form -->
      <form id="login-form" class="form-section">
        <h2>Login</h2>
        <input id="login-username" type="text" placeholder="Username" required />
        <input id="login-password" type="password" placeholder="Password" required />
        <button type="button" id="login-btn">Login</button>
        <p>Don't have an account? <a href="#" id="show-register">Register</a></p>
      </form>

      <!-- Register Form (Hidden) -->
      <form id="register-form" class="form-section" style="display: none;">
        <h2>Register</h2>
        <input id="register-username" type="text" placeholder="Username (min 3 chars)" required />
        <input id="register-password" type="password" placeholder="Password (min 6 chars)" required />
        <button type="button" id="register-btn">Register</button>
        <p>Already have an account? <a href="#" id="show-login">Login</a></p>
      </form>
    </div>

    <!-- Task Container (Hidden until login) -->
    <div id="task-container" class="task-container" style="display: none;">
      <div class="header">
        <h1>My Tasks</h1>
        <div id="user-display" class="user-display"></div>
        <div class="location-actions">
          <button id="location-btn" class="location-btn">Start Tracking Location</button>
          <button id="logout-btn" class="logout-btn">Logout</button>
        </div>
      </div>

      <div id="location-display" class="location-display"></div>
      <div id="map" class="map-container" style="display: none;"></div>
      <div id="admin-location-panel" class="admin-location-panel" style="display: none;">
        <h2>Shared Locations</h2>
        <ul id="shared-location-list" class="shared-location-list"></ul>
      </div>

      <form id="task-form" class="task-form">
        <input id="task-input" type="text" placeholder="Add a new task..." required />
        <button type="submit">Add Task</button>
      </form>

      <ul id="task-list" class="task-list"></ul>
    </div>
  </main>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js" integrity="sha256-gZCkTVbHfGA+fImagehCwIf5Gf77mCGxwUUwN1e5Awk=" crossorigin=""></script>
  <script src="index.js"></script>
</body>
</html>
